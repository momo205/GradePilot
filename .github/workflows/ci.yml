name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
      - run: ruff check . && black --check . && mypy .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          pip install \
            fastapi uvicorn pydantic httpx python-jose[cryptography] \
            python-multipart \
            sqlalchemy google-genai google-auth-oauthlib google-api-python-client \
            pypdf \
            pytest pytest-asyncio pytest-mock pytest-cov
          pip install -e . --no-deps
      - run: pytest --cov=app --cov-fail-under=70

